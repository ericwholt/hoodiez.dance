<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Hoodiez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #050505;
      --bg-mid: #30303c;
      --mint: #00fce4;
      --mint-light: #c0fcf0;
      --cream: #fcf0c0;
      --white: #ffffff;
      --ink: #050505;
      --shadow: 6px 6px 0 0 #6c9c9c;
      --pixel-border: 3px solid var(--ink);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 252, 228, 0.08), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(48, 48, 60, 0.35), transparent 45%),
        var(--bg-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 1.6;
      image-rendering: pixelated;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 3px
      );
      mix-blend-mode: multiply;
      opacity: 0.55;
    }

    .starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--mint-light);
      box-shadow: 0 0 0 1px rgba(192, 252, 240, 0.18);
      animation: twinkle var(--dur, 3s) steps(3) infinite alternate;
      opacity: 0;
    }

    .star.pink { background: var(--mint-light); box-shadow: 0 0 0 1px rgba(192, 252, 240, 0.2); }
    .star.cream { background: var(--cream); box-shadow: 0 0 0 1px rgba(252, 240, 192, 0.25); }

    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: var(--max-opacity, 0.8); transform: scale(1.2); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      padding: 2.25rem 1.75rem;
      margin: 1.25rem;
      background: var(--bg-mid);
      border: 3px solid var(--mint);
      border-radius: 0;
      box-shadow: var(--shadow);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-code {
      display: inline-block;
      font-family: 'Press Start 2P', system-ui, monospace;
      font-size: clamp(2rem, 10vw, 4.5rem);
      color: var(--mint);
      text-shadow: 5px 5px 0 var(--ink);
      line-height: 1;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Press Start 2P', system-ui, monospace;
      font-size: clamp(1rem, 3vw, 1.5rem);
      line-height: 1.35;
      color: var(--cream);
      text-shadow: 3px 3px 0 var(--ink);
      margin-bottom: 1rem;
    }

    .message {
      font-size: 1.05rem;
      color: var(--mint-light);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .back-link {
      display: inline-block;
      padding: 0.85rem 1.25rem;
      font-family: 'Press Start 2P', system-ui, monospace;
      font-size: 0.7rem;
      color: var(--ink);
      background: var(--mint);
      border: var(--pixel-border);
      border-radius: 0;
      text-decoration: none;
      transition: transform 0.08s linear, box-shadow 0.08s linear, background 0.15s;
      box-shadow: 4px 4px 0 0 #6c9c9c;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
    }

    .back-link:hover {
      background: var(--cream);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 0 #6c9c9c;
    }

    .back-link:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 0 #6c9c9c;
    }
  </style>
</head>
<body>

<div class="starfield" id="starfield"></div>

<div class="card">
  <div class="error-code">404</div>
  <h1>This page doesn't exist</h1>
  <p class="message">Looks like you hit a wrong move. Let's get you back on beat.</p>
  <a href="/" class="back-link">Back to Home</a>
</div>

<script>
  (function() {
    const field = document.getElementById('starfield');
    const count = Math.min(100, Math.floor(window.innerWidth * window.innerHeight / 10000));
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      const tints = ['', 'pink', 'cream', '', '', ''];
      const tint = tints[Math.floor(Math.random() * tints.length)];
      s.className = 'star' + (tint ? ' ' + tint : '');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--dur', (2 + Math.random() * 4).toFixed(1) + 's');
      s.style.setProperty('--max-opacity', (0.4 + Math.random() * 0.6).toFixed(2));
      s.style.animationDelay = (Math.random() * 5).toFixed(1) + 's';
      if (Math.random() > 0.7) s.style.width = s.style.height = '5px';
      field.appendChild(s);
    }
  })();
</script>

</body>
</html>
