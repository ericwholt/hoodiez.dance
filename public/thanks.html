<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Registered! — Hoodiez Dance Class</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0d0b1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
      opacity: 0;
    }

    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: var(--max-opacity, 0.8); transform: scale(1.2); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      padding: 3rem 2rem;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .check {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: inline-block;
      animation: popIn 0.5s ease-out 0.3s both;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-family: 'Dela Gothic One', sans-serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      background: linear-gradient(135deg, #34d399 0%, #4ade80 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1.15rem;
      color: #f472b6;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .address {
      font-size: 0.95rem;
      color: #c4b5d4;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .back-link {
      display: inline-block;
      padding: 0.75rem 2rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ec4899 0%, #a855f7 100%);
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(236, 72, 153, 0.35);
    }

    .back-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(236, 72, 153, 0.5);
    }
  </style>
</head>
<body>

<div class="starfield" id="starfield"></div>

<div class="card" id="card">
  <div class="check" id="loadingCheck">&#8987;</div>
  <h1 id="heading">Verifying payment...</h1>
  <p class="subtitle" id="subtitle"></p>
  <p class="address" id="address"></p>
  <a href="/" class="back-link" id="backLink" style="display:none">Back to Event Page</a>
</div>

<script>
  (function() {
    const field = document.getElementById('starfield');
    const count = Math.min(100, Math.floor(window.innerWidth * window.innerHeight / 10000));
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--dur', (2 + Math.random() * 4).toFixed(1) + 's');
      s.style.setProperty('--max-opacity', (0.4 + Math.random() * 0.6).toFixed(2));
      s.style.animationDelay = (Math.random() * 5).toFixed(1) + 's';
      if (Math.random() > 0.7) s.style.width = s.style.height = '3px';
      field.appendChild(s);
    }
  })();

  // Verify the Stripe session before showing confirmation
  (async function() {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (!sessionId) {
      document.getElementById('loadingCheck').textContent = '\u274C';
      document.getElementById('heading').textContent = 'No payment found';
      document.getElementById('subtitle').textContent = 'Please complete registration first.';
      document.getElementById('backLink').style.display = '';
      return;
    }

    try {
      const res = await fetch('/api/verify-session?session_id=' + encodeURIComponent(sessionId));
      const data = await res.json();

      if (data.verified) {
        document.getElementById('loadingCheck').textContent = '\uD83C\uDF89';
        document.getElementById('heading').textContent = "You're Registered!";
        document.getElementById('subtitle').textContent = 'See you on April 18th at Expressions Dance Academy!';
        document.getElementById('address').innerHTML = '6710 Division Ave S<br>Grand Rapids, MI 49548';
        document.getElementById('backLink').style.display = '';
      } else {
        document.getElementById('loadingCheck').textContent = '\u274C';
        document.getElementById('heading').textContent = 'Payment not confirmed';
        document.getElementById('subtitle').textContent = 'We could not verify your payment. Please try again or contact us.';
        document.getElementById('backLink').style.display = '';
      }
    } catch (err) {
      document.getElementById('loadingCheck').textContent = '\u274C';
      document.getElementById('heading').textContent = 'Something went wrong';
      document.getElementById('subtitle').textContent = 'Please contact us if you completed payment.';
      document.getElementById('backLink').style.display = '';
    }
  })();
</script>

</body>
</html>
