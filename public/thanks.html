<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Registered! - Hoodiez Dance Class</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #050505;
      --bg-mid: #30303c;
      --mint: #00fce4;
      --mint-light: #c0fcf0;
      --cream: #fcf0c0;
      --white: #ffffff;
      --ink: #050505;
      --shadow: 6px 6px 0 0 #6c9c9c;
      --pixel-border: 3px solid var(--ink);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 252, 228, 0.08), transparent 45%),
        radial-gradient(circle at 80% 80%, rgba(48, 48, 60, 0.35), transparent 45%),
        var(--bg-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      line-height: 1.6;
      image-rendering: pixelated;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 3px
      );
      mix-blend-mode: multiply;
      opacity: 0.55;
    }

    .starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--mint-light);
      box-shadow: 0 0 0 1px rgba(192, 252, 240, 0.18);
      animation: twinkle var(--dur, 3s) steps(3) infinite alternate;
      opacity: 0;
    }

    .star.pink { background: var(--mint-light); box-shadow: 0 0 0 1px rgba(192, 252, 240, 0.2); }
    .star.cream { background: var(--cream); box-shadow: 0 0 0 1px rgba(252, 240, 192, 0.25); }

    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: var(--max-opacity, 0.8); transform: scale(1.2); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      padding: 2.25rem 1.75rem;
      margin: 1.25rem;
      background: var(--bg-mid);
      border: 3px solid var(--mint);
      border-radius: 0;
      box-shadow: var(--shadow);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .check {
      width: 84px;
      height: 84px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', system-ui, monospace;
      font-size: 2rem;
      color: var(--ink);
      background: var(--cream);
      border: var(--pixel-border);
      box-shadow: 4px 4px 0 0 var(--mint);
      margin-bottom: 1rem;
      animation: popIn 0.5s ease-out 0.3s both;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-family: 'Press Start 2P', system-ui, monospace;
      font-size: clamp(1.25rem, 4vw, 2rem);
      line-height: 1.3;
      color: var(--cream);
      text-shadow: 3px 3px 0 var(--ink);
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--mint-light);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .address {
      font-size: 0.95rem;
      color: var(--cream);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .back-link {
      display: inline-block;
      padding: 0.85rem 1.25rem;
      font-family: 'Press Start 2P', system-ui, monospace;
      font-size: 0.7rem;
      color: var(--ink);
      background: var(--mint);
      border: var(--pixel-border);
      border-radius: 0;
      text-decoration: none;
      transition: transform 0.08s linear, box-shadow 0.08s linear, background 0.15s;
      box-shadow: 4px 4px 0 0 #6c9c9c;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
    }

    .back-link:hover {
      background: var(--cream);
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 0 #6c9c9c;
    }

    .back-link:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 0 #6c9c9c;
    }
  </style>
</head>
<body>

<div class="starfield" id="starfield"></div>

<div class="card" id="card">
  <div class="check" id="loadingCheck">&#8987;</div>
  <h1 id="heading">Verifying payment...</h1>
  <p class="subtitle" id="subtitle"></p>
  <p class="address" id="address"></p>
  <a href="/" class="back-link" id="backLink" style="display:none">Back to Event Page</a>
</div>

<script>
  (function() {
    const field = document.getElementById('starfield');
    const count = Math.min(100, Math.floor(window.innerWidth * window.innerHeight / 10000));
    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      const tints = ['', 'pink', 'cream', '', '', ''];
      const tint = tints[Math.floor(Math.random() * tints.length)];
      s.className = 'star' + (tint ? ' ' + tint : '');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--dur', (2 + Math.random() * 4).toFixed(1) + 's');
      s.style.setProperty('--max-opacity', (0.4 + Math.random() * 0.6).toFixed(2));
      s.style.animationDelay = (Math.random() * 5).toFixed(1) + 's';
      if (Math.random() > 0.7) s.style.width = s.style.height = '5px';
      field.appendChild(s);
    }
  })();

  // Verify the Stripe session before showing confirmation
  (async function() {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (!sessionId) {
      document.getElementById('loadingCheck').textContent = '\u274C';
      document.getElementById('heading').textContent = 'No payment found';
      document.getElementById('subtitle').textContent = 'Please complete registration first.';
      document.getElementById('backLink').style.display = '';
      return;
    }

    try {
      const res = await fetch('/api/verify-session?session_id=' + encodeURIComponent(sessionId));
      const data = await res.json();

      if (data.verified) {
        document.getElementById('loadingCheck').textContent = '\uD83C\uDF89';
        document.getElementById('heading').textContent = "You're Registered!";
        document.getElementById('subtitle').textContent = 'See you on May 14th at Moveir Dance Studio!';
        document.getElementById('address').innerHTML = '2485 Burlingame Ave SW<br>Wyoming, MI 49509';
        document.getElementById('backLink').style.display = '';
      } else {
        document.getElementById('loadingCheck').textContent = '\u274C';
        document.getElementById('heading').textContent = 'Payment not confirmed';
        document.getElementById('subtitle').textContent = 'We could not verify your payment. Please try again or contact us.';
        document.getElementById('backLink').style.display = '';
      }
    } catch (err) {
      document.getElementById('loadingCheck').textContent = '\u274C';
      document.getElementById('heading').textContent = 'Something went wrong';
      document.getElementById('subtitle').textContent = 'Please contact us if you completed payment.';
      document.getElementById('backLink').style.display = '';
    }
  })();
</script>

</body>
</html>
